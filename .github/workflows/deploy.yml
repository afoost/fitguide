name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Inject cache-bust version
        run: |
          python3 -c "
          import time, re, pathlib
          v = str(int(time.time()))
          html = pathlib.Path('dist/index.html').read_text(encoding='utf-8')
          html = re.sub(r'(/fitguide/assets/index[^.]+\.js)', r'\1?v=' + v, html)
          html = re.sub(r'(/fitguide/assets/index[^.]+\.css)', r'\1?v=' + v, html)
          pathlib.Path('dist/index.html').write_text(html, encoding='utf-8')
          print('Injected version:', v)
          print('Script tag:', re.search(r'<script[^>]+>', html).group())
          print('CSS link:', re.search(r'<link[^>]+stylesheet[^>]+>', html).group())
          "

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
